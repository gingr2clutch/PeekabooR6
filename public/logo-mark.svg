<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Wall: solid black left half with subtly rounded outer corners and a
       concave right edge that traces the crosshair circle exactly. -->
  <path d="M 4 0 L 32 0 L 32 18 A 14 14 0 0 0 32 46 L 32 64 L 4 64 A 4 4 0 0 1 0 60 L 0 4 A 4 4 0 0 1 4 0 Z" fill="#0a0a0a" />

  <!-- Crosshair right semicircle (left half is hidden by the wall). -->
  <path d="M 32 18 A 14 14 0 0 1 32 46" stroke="#ff6a00" stroke-width="6" stroke-linecap="round" fill="none" />

  <!-- Single horizontal tick extending right from the ring. -->
  <line x1="52" y1="32" x2="60" y2="32" stroke="#ff6a00" stroke-width="6" stroke-linecap="round" />

  <!-- Center dot, perfectly concentric with the ring. -->
  <circle cx="32" cy="32" r="4" fill="#ff6a00" />
</svg>
